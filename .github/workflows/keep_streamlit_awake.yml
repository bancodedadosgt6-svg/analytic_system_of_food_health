name: Keep Streamlit Awake

on:
  schedule:
    # A cada 1 hora, no minuto 23
    - cron: "23 * * * *"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: keep-streamlit-awake
  cancel-in-progress: true

jobs:
  ping:
    name: Ping Streamlit App
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Acessar healthcheck do Streamlit
        shell: bash
        run: |
          set -euo pipefail

          BASE_URL="https://painel-dados-pet6.streamlit.app"
          HEALTH_URL="${BASE_URL}/_stcore/health"

          echo "Acessando: $HEALTH_URL"

          STATUS_CODE=$(curl \
            --silent \
            --show-error \
            --location \
            --max-redirs 5 \
            --max-time 60 \
            --retry 3 \
            --retry-delay 10 \
            --retry-all-errors \
            --user-agent "Mozilla/5.0 GitHubActions KeepAlive" \
            --output /tmp/streamlit_health_response.txt \
            --write-out "%{http_code}" \
            "$HEALTH_URL")

          echo "Status HTTP: $STATUS_CODE"
          echo "Resposta:"
          cat /tmp/streamlit_health_response.txt || true

          if [ "$STATUS_CODE" -lt 200 ] || [ "$STATUS_CODE" -ge 400 ]; then
            echo "Falha ao acessar o healthcheck do Streamlit."
            exit 1
          fi

          echo "Ping realizado com sucesso."